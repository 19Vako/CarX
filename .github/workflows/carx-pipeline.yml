name: CarX Validation Pipeline

on:
  push:
    branches:
      - main
      - dev
      - feature/**
      - hotfix/**
      - test/**
      - fix/**
      - refactor/**
  pull_request:
    branches:
      - main
      - dev

jobs:
  validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
